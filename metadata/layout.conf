# The baar-dau overlay depends on the main Gentoo tree for eclasses and profiles.
masters = gentoo

# Thin manifests: only DIST (distfile) hashes are recorded; ebuild/aux checksums
# are handled by git integrity instead.
thin-manifests = true
sign-manifests = false

# Identify the repo unambiguously to portage regardless of mount point.
repo-name = baar-dau

manifest-hashes = BLAKE2B SHA512
manifest-required-hashes = BLAKE2B

# Bugs/PRs for packages here go to this overlay, not to Gentoo Bugzilla.
